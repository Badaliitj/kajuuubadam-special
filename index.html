
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kajuuu ❤️ Badam</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="login" class="center">
  <div class="card">
    <h1>A Surprise For Kajuuu 🫶🏻</h1>
    <input type="password" id="pwd" placeholder="Enter password">
    <button onclick="unlock()">Unlock ❤️</button>
    <p id="msg"></p>
  </div>
</div>

<div id="site" style="display:none">
  <h1>Happy 3rd Anniversary Kanishaa 🫶🏻</h1>
  <h2>Forever Yours, Badam 💗</h2>
  <p>Together since 17 June 2023</p>

  <section>
    <h3>Our Memories 📸</h3>
    <p>Add your photos in the images folder.</p>
  </section>

  <section>
    <h3>Love Letter 💌</h3>
    <p>Write your message here.</p>
  </section>
</div>

<script>
const PASSWORD="BadalKashuu#103";
function unlock(){
  if(document.getElementById("pwd").value===PASSWORD){
    document.getElementById("login").style.display="none";
    document.getElementById("site").style.display="block";
  } else {
    document.getElementById("msg").innerText="Wrong password";
  }
}
</script>
</body>
</html>
